{%extends 'base.html'%}

{%block content%}
    <header class="bg-dark py-5 h-75">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder">Update User Info</h1>
                <p class="lead fw-normal text-white-50 mb-0">Changes your info </p>
            </div>
        </div>
    </header> 

    <div class="container">
        <div class="col-md-6 offset-md-3">
                <br><br><br><br><h1>Billing INfo</h1>
                <form method="POST" action="{%url 'update_info'%}">
                {%csrf_token%}
                
                {{ form.as_p}}
                <br/><br><h1>Shipping INfo</h1>
                {{shipping_form.as_p}}
                <br><br><br>
                <button type="submit" class="btn btn-secondary ">Update</button>
                
            </form> <br>    
                
        </div>
        
    </div>

{%endblock%}
